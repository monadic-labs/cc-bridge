<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC-Bridge Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --accent: #38bdf8;
            --border: #334155;
            --success: #22c55e;
            --error: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
        }
        nav {
            width: 240px;
            background-color: var(--card-bg);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
        }
        nav h1 { font-size: 1.25rem; margin-bottom: 2rem; color: var(--accent); }
        nav ul { list-style: none; padding: 0; }
        nav li { padding: 0.75rem 1rem; cursor: pointer; border-radius: 0.5rem; margin-bottom: 0.5rem; transition: background 0.2s; }
        nav li:hover { background: var(--border); }
        nav li.active { background: var(--accent); color: var(--bg-color); font-weight: 600; }

        main { flex: 1; padding: 2rem; overflow-y: auto; }
        .card { background: var(--card-bg); border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid var(--border); }
        h2 { margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #94a3b8; }
        input, select, textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            padding: 0.75rem;
            border-radius: 0.4rem;
            box-sizing: border-box;
        }
        button {
            background: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.4rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button.secondary { background: #475569; color: white; }

        .list-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 1rem; 
            border-bottom: 1px solid var(--border);
        }
        .list-item:last-child { border-bottom: none; }
        .tag { background: #334155; padding: 0.2rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; }

        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            display: none;
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <nav>
        <h1>CC-Bridge</h1>
        <ul id="menu">
            <li data-tab="providers" class="active">Providers</li>
            <li data-tab="routes">Routing Rules</li>
            <li data-tab="extensions">Extensions</li>
            <li data-tab="status">Status</li>
        </ul>
        <div style="position: absolute; bottom: 2rem; width: 200px;">
            <button id="save-btn" style="width: 100%;">Save Changes</button>
        </div>
    </nav>

    <main id="content">
        <!-- Dynamic content here -->
    </main>

    <div id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
